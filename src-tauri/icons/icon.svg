<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="cylBody" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1d4ed8"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="cylBottom" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e40af"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="cylTop" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Cylinder body -->
  <rect x="262" y="290" width="500" height="460" fill="url(#cylBody)"/>

  <!-- Bottom ellipse (shadow) -->
  <ellipse cx="512" cy="750" rx="250" ry="72" fill="url(#cylBottom)"/>

  <!-- Horizontal data-row lines (elliptical arcs matching cylinder curvature) -->
  <path d="M 262,405 A 250,72 0 0 0 762,405" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="5"/>
  <path d="M 262,520 A 250,72 0 0 0 762,520" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="5"/>
  <path d="M 262,635 A 250,72 0 0 0 762,635" fill="none" stroke="rgba(255,255,255,0.12)" stroke-width="5"/>

  <!-- Top ellipse (highlight) -->
  <ellipse cx="512" cy="290" rx="250" ry="72" fill="url(#cylTop)"/>
</svg>
