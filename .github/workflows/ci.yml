name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config \
            gnome-keyring dbus-x11 libsecret-tools
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Run Rust tests
        run: |
          # Start a D-Bus session and initialize the gnome-keyring default
          # collection so the secret-service backend in keyring v2 can store
          # passwords on this headless Linux runner.
          dbus-run-session -- bash -c '
            gnome-keyring-daemon --unlock --components=secrets <<< "" &
            sleep 1
            # Seed a dummy entry so gnome-keyring creates the default collection.
            echo -n "init" | secret-tool store --label=init service __init__ account __init__ 2>/dev/null || true
            sleep 1
            cargo test --manifest-path src-tauri/Cargo.toml
          '
