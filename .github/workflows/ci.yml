name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run test:run

  test-rust:
    name: Rust Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev pkg-config \
            gnome-keyring dbus-x11
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Run Rust tests
        run: |
          # Start a full D-Bus session and launch gnome-keyring-daemon within
          # it so that keyring v2 (secret-service backend) works on this
          # headless Linux runner.
          dbus-run-session -- bash -c '
            echo -n "" | gnome-keyring-daemon --unlock --components=secrets &
            sleep 2
            cargo test --manifest-path src-tauri/Cargo.toml
          '
